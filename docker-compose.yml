services:
  postgres:
    image: postgres:16-alpine
    container_name: autolinkpro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aztec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DATABASE:-autolinkpro}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
